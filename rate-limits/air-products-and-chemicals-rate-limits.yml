description: Air Products does not publish public API rate-limit documentation. Customer digital
  integrations (telemetry, MyAirProducts portal, EDI / order integrations) are governed by the gas
  supply agreement, and any throttling thresholds are set bilaterally with the customer's IT contact.
notes: No public rate-limit documentation; placeholders pending direct vendor confirmation.
sources:
  - https://www.airproducts.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contractual integration limits
    scope: contract
    metric: varies
    limit: defined per supply / integration agreement
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on throttling responses,
      honoring Retry-After when present.
  - name: Contractual Limits
    description: Telemetry frequency, EDI batch cadence, and portal API throughput are negotiated as
      part of the customer integration agreement; raise via the assigned Air Products technology
      contact.
