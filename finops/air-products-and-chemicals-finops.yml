serviceCategory: Industrial Gases / Chemicals
tags:
  - Industrial Gases
  - Chemicals
  - Energy
  - Manufacturing
  - Hydrogen
  - FinOps
  - FOCUS
description: FOCUS-aligned shape for Air Products. Cost surface is industrial-gas product, on-site
  equipment, and services under long-term supply contracts — not API consumption. APIs and telemetry
  are integration plumbing covered by the supply agreement.
notes: No API rate card; meters reflect the industrial-gas billing surface (product volume, equipment,
  delivery) plus customer-side API request telemetry.
sources:
  - https://www.airproducts.com/
billingModel:
  pricingCategory: Take-or-Pay / Long-Term Supply
  billingFrequency: Monthly
  billingCurrency: USD/EUR/GBP
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Industrial Gas Supply
  ServiceCategory: Industrial Gases / Chemicals
  ProviderName: Air Products and Chemicals
  PublisherName: Air Products and Chemicals, Inc.
  InvoiceIssuerName: Air Products and Chemicals, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: gas_volume
    description: Industrial-gas product delivered (hydrogen, oxygen, nitrogen, helium, argon, etc.)
    unit: varies
    aggregation: sum
    dimensions:
      - product
      - delivery_mode
      - site
      - region
  - name: equipment_rental
    description: On-site tank, vaporizer, and equipment rental
    unit: equipment-month
    aggregation: sum
    dimensions:
      - equipment_type
      - site
  - name: delivery_charges
    description: Delivery, fuel surcharge, hazmat, and transport fees
    unit: delivery
    aggregation: sum
    dimensions:
      - mode
      - region
  - name: api_requests
    description: API requests against Air Products portal / telemetry endpoints (customer-side telemetry)
    unit: request
    aggregation: sum
    dimensions:
      - integration
      - site
principles:
  - name: Visibility
    description: Track Air Products spend at the site / product level via the MyAirProducts portal and
      monthly invoices; correlate with on-site tank telemetry to see consumption vs delivery cadence.
  - name: Allocation
    description: Allocate by site, business unit, and gas product; tank-level telemetry is the natural
      allocation key.
  - name: Optimization
    description: Optimize through right-sizing tank capacity, scheduling deliveries to avoid emergency
      runs, consolidating gas products where feasible, and re-negotiating take-or-pay tiers at renewal.
  - name: Accountability
    description: Plant operations and procurement jointly own the Air Products contract; align reviews
      with the gas-supply renewal cycle and major capex (on-site plant) decisions.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
