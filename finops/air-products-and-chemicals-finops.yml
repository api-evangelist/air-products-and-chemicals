provider: Air Products and Chemicals
providerId: air-products-and-chemicals
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
