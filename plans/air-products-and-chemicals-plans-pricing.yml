description: Air Products is a global industrial-gas and process-technology supplier (hydrogen, oxygen,
  nitrogen, helium, LNG technology, gasification). It does not publish a public developer or API rate
  card; product is sold under long-term gas-supply, on-site, or merchant-tank contracts. Customer
  digital integrations (e.g., MyAirProducts portal, telemetry on customer-site tanks, scheduling) are
  provisioned as part of those supply agreements.
notes: No public API pricing. Air Products bills on industrial-gas product, equipment, and service —
  not API calls.
sources:
  - https://www.airproducts.com/
plans:
  - id: air-products-supply-contract
    name: Gas Supply / Service Contract
    type: enterprise
    description: Industrial-gas supply agreement (bulk, packaged, on-site / pipeline). Digital and
      telemetry access is included in the contract; pricing is on the gas product, equipment rental,
      and services rather than API consumption.
    entries:
      - label: Supply contract
        name: supply_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact Air Products
        userMultiplied: false
    elements:
      - name: Gas product (hydrogen, oxygen, nitrogen, helium, argon, etc.)
      - name: Tank / on-site equipment
      - name: Customer telemetry and tank monitoring
      - name: MyAirProducts customer portal
